<!DOCTYPE html>
<html lang="uk" style="background: #000; height: 100%;">
<head>
    <meta charset="UTF-8">
    <title>Finance Liquid Pro v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        /* Онови цей блок */
html, body { 
    background-color: #000 !important; 
    color: #fff !important; /* Ось цей рядок обов'язковий */
    margin: 0; 
    padding: 0; 
    height: 100dvh; 
    width: 100%; 
    overflow: hidden; 
    font-family: -apple-system, system-ui, sans-serif; 
    position: fixed;
}

        .liquid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; overflow: hidden; }
        .blob { position: absolute; width: 400px; height: 400px; background: #6366f1; filter: blur(90px); border-radius: 50%; opacity: 0.15; animation: move 20s infinite alternate; }
        .blob-2 { background: #a855f7; right: -100px; top: 20%; animation-duration: 25s; opacity: 0.1; }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(100px, 100px); } }
        .glass-card { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 24px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Онови блок навігації */
.tab-bar { 
    position: fixed; 
    bottom: 0; 
    left: 0; 
    right: 0;
    /* Висота панелі тепер мінімально необхідна */
    height: calc(55px + env(safe-area-inset-bottom)); 
    background: rgba(15, 15, 15, 0.85); 
    backdrop-filter: blur(40px); 
    -webkit-backdrop-filter: blur(40px);
    border-top: 0.5px solid rgba(255,255,255,0.1);
    display: flex; 
    justify-content: space-around; 
    align-items: flex-start; /* Іконки зверху */
    padding-top: 8px;
    padding-bottom: env(safe-area-inset-bottom); 
    z-index: 1000; 
}
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,0.3); font-size: 10px; font-weight: 600; flex: 1; }
        .tab-item.active { color: #fff; }
        /* Онови блок центральної кнопки */
.add-btn-wrap { 
    position: fixed; 
    bottom: calc(20px + env(safe-area-inset-bottom)); 
    left: 50%; 
    transform: translateX(-50%); 
    z-index: 1100; 
}

.add-btn { 
    width: 60px; 
    height: 60px; 
    background: var(--accent-grad); 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); 
    border: 4px solid #000; 
    color: white; 
    transition: 0.3s;
}
        .user-btn { flex: 1; padding: 12px; text-align: center; border-radius: 14px; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); transition: 0.2s; }
        .user-btn.active { background: #fff; color: #000; }
        /* Онови відступ екранів, щоб контент не перекривався навігацією */
.screen { 
    display: none; 
    height: 100%; 
    overflow-y: auto; 
    padding: 16px; 
    padding-bottom: calc(100px + env(safe-area-inset-bottom)); 
    -webkit-overflow-scrolling: touch; 
}
        .screen.active { display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .loader { width: 18px; height: 18px; border: 2px solid #000; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rot 0.6s linear infinite; }
        @keyframes rot { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
       select {
    appearance: none; /* Прибираємо стандартну стрілку браузера */
    background-color: rgba(255, 255, 255, 0.05) !important;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    border-radius: 14px;
    padding: 10px 35px 10px 15px !important;
    color: white !important;
    font-size: 12px;
    outline: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 14px;
}

/* Стилізація списку опцій всередині (працює переважно на десктопах, на iOS буде системний барабан) */
select option {
    background-color: #1a1a1a;
    color: white;
}
        /* Новий стиль для селектора днів */
.day-chip {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    transition: 0.2s;
}
.day-chip.active {
    background: #fff;
    color: #000;
    border-color: #fff;
    transform: scale(1.1);
}
    </style>
</head>
<body>

    <div class="liquid-bg"><div class="blob"></div><div class="blob blob-2"></div></div>

    <div class="flex flex-col h-full pt-[env(safe-area-inset-top)]">
        
        <main class="flex-1 overflow-hidden relative">
            
            <!-- SCREEN 1: OVERVIEW -->
            <section id="home" class="screen active">
                <div class="flex gap-2 mb-6">
                    <div id="card-Vlad" onclick="filterHomeUser('Влад')" class="glass-card flex-1 p-5 text-center transition-all border-b-4 border-transparent">
                        <p id="curVlad" class="text-2xl font-bold text-blue-400">₴0</p>
                        <p class="text-[9px] opacity-40 uppercase tracking-widest font-bold">Влад</p>
                    </div>
                    <div id="card-Tania" onclick="filterHomeUser('Таня')" class="glass-card flex-1 p-5 text-center transition-all border-b-4 border-transparent">
                        <p id="curTania" class="text-2xl font-bold text-pink-400">₴0</p>
                        <p class="text-[9px] opacity-40 uppercase tracking-widest font-bold">Таня</p>
                    </div>
                </div>

                <!-- Month Stepper -->
                <div class="flex items-center justify-between glass-card px-6 py-4 mb-6">
                    <button onclick="stepMonth(-1)" class="p-2 opacity-50 active:scale-90 transition-all text-xl">←</button>
                    <div class="text-center">
                        <p id="mLabel" class="text-sm font-bold tracking-tight">Завантаження...</p>
                        <p class="text-[8px] opacity-30 uppercase font-black">Поточний період</p>
                    </div>
                    <button onclick="stepMonth(1)" class="p-2 opacity-50 active:scale-90 transition-all text-xl">→</button>
                </div>

                <!-- Categories Block -->
                <div class="space-y-3">
                    <h3 class="text-[10px] font-bold opacity-40 uppercase ml-2 tracking-widest">Витрати за категоріями</h3>
                    <div id="catBlock" class="grid grid-cols-1 gap-2"></div>
                </div>
            </section>

            <!-- SCREEN 2: ADD RECORD -->
            <section id="add" class="screen">
                <div class="glass-card p-6 space-y-6">
                    <div class="flex bg-white/5 p-1 rounded-2xl border border-white/10">
                        <button onclick="setUser('Влад', this)" class="user-btn active">ВЛАД</button>
                        <button onclick="setUser('Таня', this)" class="user-btn">ТАНЯ</button>
                    </div>

                    <input type="number" id="amount" inputmode="decimal" placeholder="0" class="w-full bg-transparent text-center outline-none py-4 text-white text-8xl font-thin tracking-tighter">

                    <div class="flex gap-2">
                        <button onclick="setMethod('💳 Карта', this)" class="user-btn active text-[10px]">💳 КАРТА</button>
                        <button onclick="setMethod('💵 Готівка', this)" class="user-btn text-[10px]">💵 ГОТІВКА</button>
                    </div>

                    <div id="catPicker" class="grid grid-cols-2 gap-2 max-h-60 overflow-y-auto no-scrollbar">
                        <!-- Динамічні категорії -->
                    </div>

                    <div id="subContainer" class="hidden"><div id="subGrid" class="flex gap-2 overflow-x-auto no-scrollbar py-2"></div></div>

                    <input type="text" id="comment" placeholder="Коментар..." class="w-full bg-white/5 p-5 rounded-2xl text-center outline-none border border-white/5 text-sm">
                    
                    <button onclick="save()" id="saveBtn" class="w-full py-5 rounded-2xl font-black bg-white text-black uppercase text-xs tracking-[0.2em] active:scale-95 transition-all">
                        <span id="btnText">ЗБЕРЕГТИ ВИТРАТУ</span>
                    </button>
                </div>
            </section>

            <!-- SCREEN 3: ANALYTICS -->
            <section id="analytics" class="screen">
                                <div class="glass-card p-5 mb-6">
                    <h3 class="text-[10px] font-bold opacity-40 uppercase mb-4 tracking-widest">Динаміка витрат (дні)</h3>
                    <div class="h-48">
                        <canvas id="dailyChart"></canvas>
                    </div>
                </div>
                <div class="glass-card p-6 mb-6">
                    <h3 class="text-xs font-bold uppercase opacity-40 mb-6 tracking-widest text-center">Розподіл витрат</h3>
                    <div class="h-64 relative">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>

                <div class="glass-card p-6 mb-6">
                    <h3 class="text-xs font-bold uppercase opacity-40 mb-4 tracking-widest">Хто витрачає більше?</h3>
                    <div class="h-40">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>

                <div class="space-y-2" id="topCatsList">
                    <!-- Рейтинг категорій -->
                </div>
            </section>

            <!-- SCREEN 4: OPTIONS (CRUD) -->
            <section id="options" class="screen">
                <div class="glass-card p-6 mb-6">
                    <h3 class="text-sm font-bold mb-4">Керування категоріями</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newCatName" placeholder="Назва..." class="flex-1 bg-white/5 p-3 rounded-xl outline-none border border-white/10 text-xs">
                        <button onclick="addCategory()" class="bg-white text-black px-4 rounded-xl text-xs font-bold">+</button>
                    </div>
                    <div id="manageCatsList" class="space-y-2"></div>
                </div>

                <div class="glass-card p-6">
                    <h3 class="text-sm font-bold mb-4">Підкатегорії</h3>
                    <select id="parentCatSelect" class="w-full bg-white/5 p-3 rounded-xl mb-3 border border-white/10 text-xs text-white outline-none"></select>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newSubName" placeholder="Підкатегорія..." class="flex-1 bg-white/5 p-3 rounded-xl outline-none border border-white/10 text-xs">
                        <button onclick="addSubcategory()" class="bg-white text-black px-4 rounded-xl text-xs font-bold">+</button>
                    </div>
                    <div id="manageSubsList" class="space-y-2"></div>
                </div>
            </section>

            <!-- SCREEN 5: HISTORY (Hidden by default, triggered by Tab) -->
            <section id="history" class="screen">
    <div class="glass-card p-4 mb-4 space-y-3">
        <div class="flex gap-2">
            <!-- Стилізовані селектори -->
            <select id="histUserF" onchange="s.uF_hist = this.value; renderHistory();" class="flex-1"></select>
            <select id="histCatF" onchange="s.cF_hist = this.value; renderHistory();" class="flex-1"></select>
        </div>
        <!-- Селектор днів -->
        <div id="daySelector" class="flex gap-2 overflow-x-auto no-scrollbar py-1"></div>
    </div>
    <div id="hList" class="space-y-2"></div>
</section>

        </main>

        <!-- NAVIGATION -->
        <nav class="tab-bar">
            <div class="tab-item active" onclick="switchTab('home', this)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"></path></svg>
                Огляд
            </div>
            <div class="tab-item" onclick="switchTab('history', this)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Історія
            </div>
            
            <div class="add-btn-wrap" onclick="switchTab('add', this)">
                <button class="add-btn">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 6v12M6 12h12"></path></svg>
                </button>
            </div>

            <div class="tab-item" onclick="switchTab('analytics', this)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                Аналіз
            </div>
            <div class="tab-item" onclick="switchTab('options', this)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                Опції
            </div>
        </nav>
    </div>

    <script>
        const SUPABASE_URL = 'https://xezhbqcteaihrlrykbkr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qNcUyFxMlWAWAry3uSHndg_ADVMCE3a';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

       let s = { 
    u: 'Влад', c: '', sc: '', m: '💳 Карта', d: [], cats: [], subs: [], 
    mF: '', uniqueMonths: [], 
    uF_home: 'All', // Фільтр юзера на головній
    uF_hist: 'All', // Фільтр юзера в історії
    cF_hist: 'All', // Фільтр категорії в історії
    dayF_hist: 'All'
};
        let charts = { pie: null, bar: null, daily: null };

        // --- CORE ---
       function switchTab(id, el) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    
    // Якщо клікнули на вкладку (а не на центральну кнопку +)
    if(el.classList.contains('tab-item')) el.classList.add('active');

    if(id === 'analytics') renderAnalytics();
    
    // ФІКС ІСТОРІЇ: скидаємо фільтри при вході
    if(id === 'history') {
        s.uF_hist = 'All'; 
        s.cF_hist = 'All';
        
        // Візуально оновлюємо селектори фільтрів (якщо вони вже створені)
        const uSel = document.getElementById('histUserF');
        const cSel = document.getElementById('histCatF');
        if(uSel) uSel.value = 'All';
        if(cSel) cSel.value = 'All';
        
        renderHistory();
    }
}

        function setUser(n, el) { s.u = n; document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function setMethod(m, el) { s.m = m; el.parentElement.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }

        // --- DB DATA ---
        async function loadData() {
            // Категорії
            const { data: catData } = await sb.from('categories').select('*').order('name');
            s.cats = catData || [];
            
            // Підкатегорії
            const { data: subData } = await sb.from('subcategory').select('*');
            s.subs = subData || [];

            // Витрати
            const { data, error } = await sb.from('expenses').select('*').order('date', { ascending: false });
            if (error) return;

            const monthsNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];
            
            s.d = data.map(item => {
                const dateObj = new Date(item.date);
                return {
                    id: item.id, u: item.who, c: item.categoria, sc: item.subcategory, a: parseFloat(item.sum), 
                    m: item.metod, cm: item.comm,
                    mId: dateObj.getFullYear() + "-" + ("0" + (dateObj.getMonth() + 1)).slice(-2), 
                    mLab: monthsNames[dateObj.getMonth()] + " " + dateObj.getFullYear(),
                    d: dateObj.toLocaleString('uk-UA', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})
                };
            });

            const monthsSet = [...new Set(s.d.map(i => i.mId))].sort().reverse();
            s.uniqueMonths = monthsSet;
            if (!s.mF && monthsSet.length > 0) s.mF = monthsSet[0];
            
            renderOverview();
            renderPickers();
            renderManageList();
        }

        // --- OVERVIEW (Month Stepper & Category Blocks) ---
       function stepMonth(dir) {
    let idx = s.uniqueMonths.indexOf(s.mF);
    idx += dir;
    if (idx >= 0 && idx < s.uniqueMonths.length) {
        s.mF = s.uniqueMonths[idx];
        s.dayF_hist = 'All'; // Скидаємо вибраний день при зміні місяця
        renderOverview();
        if (document.getElementById('history').classList.contains('active')) {
            renderHistory();
        }
    }
}

        function filterHomeUser(user) {
    // Якщо клікнули на того самого — скидаємо на "Всі"
    s.uF_home = (s.uF_home === user) ? 'All' : user;
    
    // Візуальна індикація активності
    document.getElementById('card-Vlad').style.borderColor = (s.uF_home === 'Влад') ? '#6366f1' : 'transparent';
    document.getElementById('card-Tania').style.borderColor = (s.uF_home === 'Таня') ? '#ec4899' : 'transparent';
    
    renderOverview(); // Перемальовуємо категорії
}

// Онови функцію renderOverview, щоб вона враховувала s.uF_home при підрахунку категорій
function renderOverview() {
    const monthData = s.d.filter(i => i.mId === s.mF);
    const labelEl = document.getElementById('mLabel');
    if (monthData.length > 0) labelEl.innerText = monthData[0].mLab;

    // Рахуємо загальні суми (завжди показуємо повні суми в картках зверху)
    let totalVlad = 0, totalTania = 0;
    monthData.forEach(i => { if (i.u === 'Влад') totalVlad += i.a; else totalTania += i.a; });
    document.getElementById('curVlad').innerText = '₴' + totalVlad.toLocaleString();
    document.getElementById('curTania').innerText = '₴' + totalTania.toLocaleString();

    // Фільтруємо дані для блоку категорій залежно від обраного юзера
    const filteredData = (s.uF_home === 'All') ? monthData : monthData.filter(i => i.u === s.uF_home);
    
    let catTotals = {};
    filteredData.forEach(i => { catTotals[i.c] = (catTotals[i.c] || 0) + i.a; });

    const block = document.getElementById('catBlock');
    block.innerHTML = Object.entries(catTotals).sort((a,b) => b[1] - a[1]).map(([name, sum]) => `
        <div class="glass-card p-4 flex justify-between items-center animate-fadeIn">
            <div>
                <p class="text-[10px] font-bold opacity-30 uppercase">${name}</p>
                <p class="text-lg font-black tracking-tighter">₴${sum.toLocaleString()}</p>
            </div>
            <div class="text-[10px] font-bold bg-white/5 px-3 py-1 rounded-full text-white/40">
                ${Math.round(sum / (totalVlad + totalTania) * 100)}%
            </div>
        </div>
    `).join('');
}

        // --- PICKERS (Dynamic Categories) ---
   function renderPickers() {
    const picker = document.getElementById('catPicker');
    // Зменшено py-6 до py-3 та gap-1 до gap-0.5
    picker.innerHTML = s.cats.map(c => `
        <div onclick="selectCat('${c.name}', this)" 
             class="cat-card border border-white/5 bg-white/5 active:scale-95 transition-all flex flex-col items-center justify-center gap-0.5 py-3 rounded-2xl">
            <span class="text-base">${c.name.split(' ')[0]}</span> <!-- Емодзі -->
            <span class="text-[9px] font-bold uppercase opacity-50 tracking-tight text-center px-1 leading-tight">
                ${c.name.split(' ').slice(1).join(' ')} <!-- Назва -->
            </span>
        </div>
    `).join('');

    // Оновлення списку в налаштуваннях
    const select = document.getElementById('parentCatSelect');
    if (select) {
        select.innerHTML = s.cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    }
}

        function selectCat(name, el) {
            s.c = name; s.sc = '';
            document.querySelectorAll('#catPicker .cat-card').forEach(b => b.classList.remove('active', 'bg-indigo-600'));
            el.classList.add('active', 'bg-indigo-600');
            
            const filtered = s.subs.filter(sub => sub.category === name);
            const container = document.getElementById('subContainer');
            if (filtered.length > 0) {
                container.classList.remove('hidden');
                document.getElementById('subGrid').innerHTML = filtered.map(sub => `
                    <div onclick="selectSub('${sub.name}', this)" class="sub-chip px-4 py-2 rounded-xl bg-white/5 text-[10px] whitespace-nowrap border border-white/10">${sub.name}</div>
                `).join('');
            } else container.classList.add('hidden');
        }

        function selectSub(name, el) {
            s.sc = name;
            el.parentElement.querySelectorAll('div').forEach(d => { d.classList.remove('bg-white', 'text-black'); d.classList.add('bg-white/5', 'text-white'); });
            el.classList.add('bg-white', 'text-black'); el.classList.remove('bg-white/5', 'text-white');
        }

        // --- ANALYTICS ---
        
        // --- OPTIONS (CRUD CATEGORIES) ---
        async function addCategory() {
            const name = document.getElementById('newCatName').value;
            if(!name) return;
            await sb.from('categories').insert([{ name }]);
            document.getElementById('newCatName').value = '';
            loadData();
        }

        async function delCat(id) {
            if(confirm('Видалити категорію?')) {
                await sb.from('categories').delete().eq('id', id);
                loadData();
            }
        }

        async function addSubcategory() {
            const parent = document.getElementById('parentCatSelect').value;
            const name = document.getElementById('newSubName').value;
            if(!name) return;
            await sb.from('subcategory').insert([{ name, category: parent }]);
            document.getElementById('newSubName').value = '';
            loadData();
        }

        async function delSub(id) {
            await sb.from('subcategory').delete().eq('id', id);
            loadData();
        }

        function renderManageList() {
            const catList = document.getElementById('manageCatsList');
            catList.innerHTML = s.cats.map(c => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                    <span class="text-xs">${c.name}</span>
                    <button onclick="delCat(${c.id})" class="text-red-400">✕</button>
                </div>
            `).join('');

            const subList = document.getElementById('manageSubsList');
            subList.innerHTML = s.subs.map(sub => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl text-[10px]">
                    <span>${sub.category} › ${sub.name}</span>
                    <button onclick="delSub(${sub.id})" class="text-red-400">✕</button>
                </div>
            `).join('');
        }

        // --- SAVE ---
        async function save() {
            const amt = document.getElementById('amount');
            if(!s.c || !amt.value) return alert('Обери категорію та суму!');
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; document.getElementById('btnText').innerHTML = '<span class="loader"></span>';

            const { error } = await sb.from('expenses').insert([{
                date: new Date().toISOString(), who: s.u, categoria: s.c,
                subcategory: s.sc, sum: parseFloat(amt.value), metod: s.m,
                comm: document.getElementById('comment').value
            }]);

            if (error) { alert(error.message); btn.disabled = false; return; }

            confetti({ particleCount: 60, spread: 60, origin: { y: 0.8 } });
            document.getElementById('btnText').innerText = 'ЗБЕРЕЖЕНО ✅';
            setTimeout(() => {
                amt.value = ''; document.getElementById('comment').value = '';
                document.getElementById('subContainer').classList.add('hidden');
                document.querySelectorAll('#catPicker .cat-card').forEach(b => b.classList.remove('active', 'bg-indigo-600'));
                btn.disabled = false; document.getElementById('btnText').innerText = 'ЗБЕРЕГТИ ВИТРАТУ';
                loadData();
                switchTab('home', document.querySelector('.tab-item'));
            }, 1000);
        }

        async function deleteExpense(id) {
            if(confirm('Видалити цю витрату?')) {
                await sb.from('expenses').delete().eq('id', id);
                loadData();
            }
        }

        function renderHistory() {
    const monthData = s.d.filter(i => i.mId === s.mF);
    
    // Малюємо дні (тільки ті, що існують)
    renderDaySelector();

    const uSelect = document.getElementById('histUserF');
    const cSelect = document.getElementById('histCatF');
    
    if (uSelect && uSelect.options.length === 0) {
        uSelect.innerHTML = `<option value="All">Всі юзери</option><option value="Влад">Влад</option><option value="Таня">Таня</option>`;
    }
    
    if (cSelect) {
        const cats = ['All', ...new Set(monthData.map(i => i.c))];
        cSelect.innerHTML = cats.map(c => `<option value="${c}" ${s.cF_hist === c ? 'selected' : ''}>${c === 'All' ? 'Всі категорії' : c}</option>`).join('');
    }

    // Фільтрація
    const filtered = monthData.filter(i => {
        const uMatch = s.uF_hist === 'All' || i.u === s.uF_hist;
        const cMatch = s.cF_hist === 'All' || i.c === s.cF_hist;
        const dMatch = s.dayF_hist === 'All' || i.d.startsWith(s.dayF_hist);
        return uMatch && cMatch && dMatch;
    });

    const hList = document.getElementById('hList');
    hList.innerHTML = filtered.length ? filtered.map(i => `
        <div class="glass-card p-4 border-l-4 ${i.u === 'Влад' ? 'border-blue-500' : 'border-pink-500'}">
            <div class="flex justify-between items-center">
                <div>
                    <p class="font-bold text-[13px] text-white">${i.c}${i.sc ? ' › <span class="opacity-50 text-[11px] text-white">'+i.sc+'</span>' : ''}</p>
                    <p class="text-[9px] opacity-30 uppercase text-white">${i.d} • ${i.u}</p>
                </div>
                <div class="flex items-center gap-3">
                    <p class="font-bold text-sm text-white">₴${i.a.toLocaleString()}</p>
                    <button onclick="deleteExpense(${i.id})" class="p-2 opacity-20 text-white">✕</button>
                </div>
            </div>
            <!-- ПОВЕРНУТО КОМЕНТАР -->
            ${i.cm ? `<p class="text-[10px] mt-2 opacity-40 italic font-light leading-tight text-white">"${i.cm}"</p>` : ''}
        </div>
    `).join('') : `<div class="text-center opacity-20 py-10 text-xs text-white">Немає витрат</div>`;
}
        // --- АНАЛІТИКА (ВИПРАВЛЕНО) ---
function renderAnalytics() {
    // 1. Створюємо масив даних лише для обраного місяця
    const filteredMonthData = s.d.filter(i => i.mId === s.mF);
    
    if (!filteredMonthData.length) {
        console.log("Немає даних для аналізу");
        return;
    }

    // 2. Викликаємо графік по днях (новий блок)
    renderDailyChart(filteredMonthData);

    // 3. Рахуємо суми для Pie Chart та Bar Chart
    const catSums = {}; 
    let vlad = 0, tania = 0;
    
    filteredMonthData.forEach(i => {
        catSums[i.c] = (catSums[i.c] || 0) + i.a;
        if(i.u === 'Влад') vlad += i.a; else tania += i.a;
    });

    // 4. Doughnut Chart (Розподіл за категоріями)
    const ctxPie = document.getElementById('pieChart').getContext('2d');
    if(charts.pie) charts.pie.destroy();
    charts.pie = new Chart(ctxPie, {
        type: 'doughnut',
        data: {
            labels: Object.keys(catSums),
            datasets: [{
                data: Object.values(catSums),
                backgroundColor: ['#6366f1', '#a855f7', '#ec4899', '#f43f5e', '#f59e0b', '#10b981'],
                borderWidth: 0,
                hoverOffset: 15
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            cutout: '75%',
            plugins: { legend: { position: 'bottom', labels: { color: 'rgba(255,255,255,0.6)', font: { size: 10 }, padding: 20 } } } 
        }
    });

    // 5. Bar Chart (Влад vs Таня)
    const ctxBar = document.getElementById('barChart').getContext('2d');
    if(charts.bar) charts.bar.destroy();
    charts.bar = new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: ['Влад', 'Таня'],
            datasets: [{
                data: [vlad, tania],
                backgroundColor: ['#3b82f6', '#ec4899'],
                borderRadius: 12,
                barThickness: 40
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            scales: { 
                y: { display: false }, 
                x: { ticks: { color: '#fff', font: { weight: 'bold' } }, grid: { display: false } } 
            },
            plugins: { legend: { display: false } }
        }
    });
}
function renderDaySelector() {
    const container = document.getElementById('daySelector');
    if (!container) return;
    
    // 1. Отримуємо дані тільки за вибраний місяць
    const currentMonthData = s.d.filter(i => i.mId === s.mF);
    
    if (currentMonthData.length === 0) {
        container.innerHTML = '';
        return;
    }

    // 2. Витягуємо унікальні дні, які є в записах
    // i.d має формат "DD.MM, HH:MM", тому беремо перші 2 символи
    const existingDays = [...new Set(currentMonthData.map(i => i.d.substring(0, 2)))];
    
    // 3. Сортуємо дні за порядком (від меншого до більшого)
    existingDays.sort((a, b) => parseInt(a) - parseInt(b));

    // 4. Формуємо HTML
    let html = `<div onclick="setHistDay('All', this)" 
                     class="day-chip ${s.dayF_hist === 'All' ? 'active' : ''}">Всі</div>`;
    
    existingDays.forEach(day => {
        html += `<div onclick="setHistDay('${day}', this)" 
                      class="day-chip ${s.dayF_hist === day ? 'active' : ''}">${day}</div>`;
    });
    
    container.innerHTML = html;
}

function setHistDay(day, el) {
    s.dayF_hist = day;
    renderHistory();
}
// --- ГРАФІК ПО ДНЯХ (ВИПРАВЛЕНО) ---
function renderDailyChart(data) {
    const days = {};
    
    // Сортуємо дані за часом, щоб графік йшов зліва направо
    const sortedData = [...data].sort((a, b) => new Date(a.date) - new Date(b.date));

    sortedData.forEach(i => {
        const day = i.d.split(',')[0]; // Беремо "DD.MM"
        if (!days[day]) days[day] = { Влад: 0, Таня: 0 };
        days[day][i.u] += i.a;
    });

    const labels = Object.keys(days);
    const vladData = labels.map(l => days[l].Влад);
    const taniaData = labels.map(l => days[l].Таня);

    const ctx = document.getElementById('dailyChart').getContext('2d');
    if(!charts) charts = {}; // Захист якщо об'єкт charts не ініціалізовано
    if(charts.daily) charts.daily.destroy();
    
    charts.daily = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: 'Влад', data: vladData, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4, pointRadius: 3 },
                { label: 'Таня', data: taniaData, borderColor: '#ec4899', backgroundColor: 'rgba(236, 72, 153, 0.1)', fill: true, tension: 0.4, pointRadius: 3 }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { 
                y: { display: false }, 
                x: { ticks: { color: 'rgba(255,255,255,0.3)', font: {size: 8} }, grid: { color: 'rgba(255,255,255,0.05)' } } 
            },
            plugins: { legend: { display: false } }
        }
    });
}
// Не забудь викликати renderDailyChart(filteredMonthData) всередині renderAnalytics!
        document.addEventListener('DOMContentLoaded', loadData);
