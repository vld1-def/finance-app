<!DOCTYPE html>
<html lang="uk" style="background: #000; height: 100%;">
<head>
    <meta charset="UTF-8">
    <title>Finance Glass Pro (Supabase)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- ПІДКЛЮЧАЄМО SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.07); --glass-border: rgba(255, 255, 255, 0.1); }
        html, body { background-color: #000 !important; color: #fff; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; position: fixed; }
        .safe-area { padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px; display: flex; flex-direction: column; height: 100%; background: #000; }
        .liquid-glass { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 18px; }
        .btn-user { background: var(--glass); border: 1px solid var(--glass-border); opacity: 0.4; transition: 0.2s; padding: 8px 0; flex: 1; text-align: center; font-size: 11px; font-weight: 600; border-radius: 10px; text-transform: uppercase; }
        .btn-user.active { opacity: 1; background: #fff; color: #000; }
        .method-btn { background: var(--glass); opacity: 0.5; flex: 1; padding: 10px; border-radius: 12px; font-size: 9px; font-weight: 700; border: 1px solid var(--glass-border); }
        .method-btn.active { opacity: 1; border-color: #fff; background: rgba(255,255,255,0.1); }
        .cat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; border-radius: 14px; display: flex; align-items: center; gap: 6px; font-size: 11px; transition: 0.2s; }
        .cat-card.active { background: #6366f1; border-color: #818cf8; transform: scale(0.97); }
        #historyDrawer { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(40px); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 50; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; }
        #historyDrawer.open { right: 0; }
        .cat-grid-stats { display: grid; grid-template-rows: repeat(2, 1fr); grid-auto-flow: column; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .stat-chip { min-width: 105px; padding: 8px; background: var(--glass); border-radius: 12px; border: 1px solid var(--glass-border); }
        .stat-chip.selected { background: #6366f1; border-color: #fff; }
        .loader { width: 14px; height: 14px; border: 2px solid currentColor; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rot 0.6s linear infinite; }
        @keyframes rot { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="safe-area">
        <!-- Header -->
        <div class="flex gap-2 mb-4 mt-2">
            <div class="liquid-glass flex-1 p-2.5 text-center">
                <p id="curVlad" class="text-base font-bold text-blue-400">₴0</p>
                <p class="text-[7px] opacity-30 uppercase font-bold text-white">Влад</p>
            </div>
            <div class="liquid-glass flex-1 p-2.5 text-center">
                <p id="curTania" class="text-base font-bold text-pink-400">₴0</p>
                <p class="text-[7px] opacity-30 uppercase font-bold text-white">Таня</p>
            </div>
            <button onclick="toggleDrawer(true)" class="liquid-glass px-4 flex items-center text-lg">📊</button>
        </div>

        <div class="flex gap-2 mb-5">
            <div onclick="setUser('Влад', this)" class="btn-user">Влад</div>
            <div onclick="setUser('Таня', this)" class="btn-user">Таня</div>
        </div>

        <div class="flex-1 space-y-3 overflow-y-auto no-scrollbar pb-6">
            <input type="number" id="amount" inputmode="decimal" placeholder="0" class="w-full bg-transparent text-center outline-none py-0 text-6xl font-extralight text-white">
            <div class="flex gap-2 px-8">
                <button onclick="setMethod('💳 Карта', this)" class="method-btn active">💳 Карта</button>
                <button onclick="setMethod('💵 Готівка', this)" class="method-btn">💵 Готівка</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div onclick="setCat('🛒 Продукти', this)" class="cat-card">🛒 Продукти</div>
                <div onclick="setCat('☕️ Кафе/Їжа', this)" class="cat-card">☕️ Кафе</div>
                <div onclick="setCat('🚕 Транспорт', this)" class="cat-card">🚕 Таксі</div>
                <div onclick="setCat('💸 Переказ', this)" class="cat-card">💸 Переказ</div>
                <div onclick="setCat('🎬 Розваги', this)" class="cat-card">🎬 Розваги</div>
                <div onclick="setCat('📦 Інше', this)" class="cat-card">📦 Інше</div>
            </div>
            <input type="text" id="comment" placeholder="Коментар..." class="w-full bg-white/5 p-2 rounded-xl text-center outline-none border border-white/5 text-white text-[10px] h-10">
            <button onclick="save()" id="saveBtn" class="w-full py-4 rounded-xl font-bold bg-white text-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-2 transition-all">
                <span id="btnText">ЗБЕРЕГТИ</span>
            </button>
        </div>
    </div>

    <!-- Analytics -->
    <div id="historyDrawer" class="flex flex-col">
        <div class="flex justify-between items-center py-2 text-white">
            <h2 class="text-sm font-bold uppercase tracking-tight opacity-50">Аналітика</h2>
            <button onclick="toggleDrawer(false)" class="text-3xl opacity-30">&times;</button>
        </div>

        <div id="monthSelector" class="flex gap-2 overflow-x-auto no-scrollbar mb-4 py-1"></div>

        <div class="flex gap-2 mb-4">
            <div class="liquid-glass flex-1 p-3 text-center border-white/5">
                <p id="resCard" class="text-sm font-bold">₴0</p>
                <p class="text-[7px] opacity-40 uppercase font-bold">💳 Карта</p>
            </div>
            <div class="liquid-glass flex-1 p-3 text-center border-white/5">
                <p id="resCash" class="text-sm font-bold">₴0</p>
                <p class="text-[7px] opacity-40 uppercase font-bold">💵 Готівка</p>
            </div>
        </div>

        <div class="mb-4">
            <div id="catGrid" class="cat-grid-stats no-scrollbar py-1"></div>
        </div>

        <div class="flex gap-2 mb-4">
            <button id="fAll" onclick="fH('All', this)" class="btn-user active">Всі</button>
            <button id="fVlad" onclick="fH('Влад', this)" class="btn-user">Влад</button>
            <button id="fTania" onclick="fH('Таня', this)" class="btn-user">Таня</button>
        </div>
        <div id="hList" class="flex-1 overflow-y-auto space-y-2 pb-20 no-scrollbar"></div>
    </div>

    <script>
        // НАЛАШТУВАННЯ SUPABASE
        const SUPABASE_URL = 'https://xezhbqcteaihrlrykbkr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qNcUyFxMlWAWAry3uSHndg_ADVMCE3a';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

       let s = { u: '', c: '', m: '💳 Карта', d: [], uF: 'All', cF: null, mF: '' };
const months = ["Січ", "Лют", "Бер", "Квіт", "Трав", "Черв", "Лип", "Серп", "Вер", "Жовт", "Лист", "Груд"];

// Функції кнопок
function setUser(n, el) { s.u = n; document.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
function setCat(n, el) { s.c = n; document.querySelectorAll('.cat-card').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
function setMethod(m, el) { s.m = m; el.parentElement.querySelectorAll('.btn-user, .method-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
function toggleDrawer(o) { document.getElementById('historyDrawer').classList.toggle('open', o); }
function fH(u, el) { s.uF = u; el.parentElement.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active')); el.classList.add('active'); render(); }

// ЗАВАНТАЖЕННЯ
// Оновлена функція завантаження з захистом
async function loadData() {
    console.log("Завантаження даних...");
    const { data, error } = await sb
        .from('expenses')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        console.error("Помилка Supabase:", error);
        return;
    }

    if (!data || data.length === 0) {
        document.getElementById('hList').innerHTML = '<p class="text-center opacity-30 mt-10">База даних порожня</p>';
        return;
    }

    s.d = data.map(item => {
        const date = new Date(item.created_at);
        return {
            u: item.user || 'Невідомо',
            c: item.category || 'Інше',
            a: item.amount || 0,
            m: item.method || '💳 Карта', // Захист: якщо пусто, ставимо дефолт
            cm: item.comment || '',
            mId: date.getFullYear() + "-" + ("0" + (date.getMonth() + 1)).slice(-2),
            mLab: months[date.getMonth()] + " " + date.getFullYear().toString().slice(-2),
            d: date.toLocaleDateString('uk-UA', {day:'2-digit', month:'2-digit'}) + " " + date.toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'})
        };
    });

    if (!s.mF && s.d.length > 0) s.mF = s.d[0].mId;

    renderMonths();
    updateCurrentMonthStats();
    render();
}

// Оновлена функція рендеру з захистом від split
function render() {
    const list = document.getElementById('hList'); 
    const grid = document.getElementById('catGrid'); 
    list.innerHTML = '';
    grid.innerHTML = '';
    
    let cardSum = 0, cashSum = 0;
    let catTotals = {};

    s.d.forEach(i => {
        if(i.mId !== s.mF) return; 
        if(s.uF !== 'All' && i.u !== s.uF) return;

        // Рахуємо статистику
        const isCard = i.m && i.m.includes("Карта");
        if(isCard) cardSum += i.a; else cashSum += i.a;
        if(!catTotals[i.c]) catTotals[i.c] = 0; catTotals[i.c] += i.a;

        if(s.cF && i.c !== s.cF) return;

        // Отримуємо іконку методу (безпечно)
        const methodIcon = i.m ? i.m.split(' ')[0] : '💳';

        const card = document.createElement('div');
        card.className = 'liquid-glass p-4 border-l-4 ' + (i.u === 'Влад' ? 'border-blue-500' : 'border-pink-500');
        card.innerHTML = `
            <div class="flex flex-col text-white">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-bold text-[11px]">${i.c}</p>
                        <p class="text-[8px] opacity-40 uppercase">${i.d} • ${i.u} • ${methodIcon}</p>
                    </div>
                    <p class="font-bold text-xs">₴${i.a.toLocaleString()}</p>
                </div>
                ${i.cm ? `<p class="text-[9px] italic opacity-60 mt-1 bg-white/5 p-1.5 rounded-lg">💬 ${i.cm}</p>` : ''}
            </div>`;
        list.appendChild(card);
    });

    document.getElementById('resCard').innerText = '₴' + cardSum.toLocaleString();
    document.getElementById('resCash').innerText = '₴' + cashSum.toLocaleString();

    for (let name in catTotals) {
        const div = document.createElement('div');
        div.className = `stat-chip flex-shrink-0 ${s.cF === name ? 'selected' : ''}`;
        div.onclick = () => { s.cF = (s.cF === name) ? null : name; render(); };
        div.innerHTML = `<p class="text-[8px] opacity-50 truncate uppercase font-bold text-white">${name}</p><p class="font-black text-xs text-white">₴${catTotals[name].toLocaleString()}</p>`;
        grid.appendChild(div);
    }
}

function renderMonths() {
    const container = document.getElementById('monthSelector');
    container.innerHTML = '';
    const uniqueMonths = {};
    s.d.forEach(i => { uniqueMonths[i.mId] = i.mLab; });
    
    Object.keys(uniqueMonths).sort().reverse().forEach(mId => {
        const div = document.createElement('div');
        div.className = `month-chip ${s.mF === mId ? 'active' : ''} bg-white/10 px-4 py-1.5 rounded-xl text-[10px] font-bold cursor-pointer whitespace-nowrap border border-white/5`;
        if(s.mF === mId) { div.classList.add('bg-white', 'text-black'); }
        div.innerText = uniqueMonths[mId];
        div.onclick = () => { s.mF = mId; renderMonths(); render(); };
        container.appendChild(div);
    });
}

function updateCurrentMonthStats() {
    const now = new Date();
    const curMonthId = now.getFullYear() + "-" + ("0" + (now.getMonth() + 1)).slice(-2);
    let v = 0, t = 0;
    s.d.forEach(i => {
        if(i.mId === curMonthId) {
            if(i.u === 'Влад') v += i.a; else if(i.u === 'Таня') t += i.a;
        }
    });
    document.getElementById('curVlad').innerText = '₴' + v.toLocaleString();
    document.getElementById('curTania').innerText = '₴' + t.toLocaleString();
}

// Оновлена функція рендеру з захистом від split
function render() {
    const list = document.getElementById('hList'); 
    const grid = document.getElementById('catGrid'); 
    list.innerHTML = '';
    grid.innerHTML = '';
    
    let cardSum = 0, cashSum = 0;
    let catTotals = {};

    s.d.forEach(i => {
        if(i.mId !== s.mF) return; 
        if(s.uF !== 'All' && i.u !== s.uF) return;

        // Рахуємо статистику
        const isCard = i.m && i.m.includes("Карта");
        if(isCard) cardSum += i.a; else cashSum += i.a;
        if(!catTotals[i.c]) catTotals[i.c] = 0; catTotals[i.c] += i.a;

        if(s.cF && i.c !== s.cF) return;

        // Отримуємо іконку методу (безпечно)
        const methodIcon = i.m ? i.m.split(' ')[0] : '💳';

        const card = document.createElement('div');
        card.className = 'liquid-glass p-4 border-l-4 ' + (i.u === 'Влад' ? 'border-blue-500' : 'border-pink-500');
        card.innerHTML = `
            <div class="flex flex-col text-white">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-bold text-[11px]">${i.c}</p>
                        <p class="text-[8px] opacity-40 uppercase">${i.d} • ${i.u} • ${methodIcon}</p>
                    </div>
                    <p class="font-bold text-xs">₴${i.a.toLocaleString()}</p>
                </div>
                ${i.cm ? `<p class="text-[9px] italic opacity-60 mt-1 bg-white/5 p-1.5 rounded-lg">💬 ${i.cm}</p>` : ''}
            </div>`;
        list.appendChild(card);
    });

    document.getElementById('resCard').innerText = '₴' + cardSum.toLocaleString();
    document.getElementById('resCash').innerText = '₴' + cashSum.toLocaleString();

    for (let name in catTotals) {
        const div = document.createElement('div');
        div.className = `stat-chip flex-shrink-0 ${s.cF === name ? 'selected' : ''}`;
        div.onclick = () => { s.cF = (s.cF === name) ? null : name; render(); };
        div.innerHTML = `<p class="text-[8px] opacity-50 truncate uppercase font-bold text-white">${name}</p><p class="font-black text-xs text-white">₴${catTotals[name].toLocaleString()}</p>`;
        grid.appendChild(div);
    }
}

async function save() {
    const amtI = document.getElementById('amount');
    const btn = document.getElementById('saveBtn');
    const btnText = document.getElementById('btnText');
    if(!s.u || !s.c || !amtI.value) return alert('Заповни все!');
    
    btn.disabled = true;
    btnText.innerHTML = '<span class="loader"></span>';

    const { error } = await sb.from('expenses').insert([{
        user: s.u,
        category: s.c,
        amount: parseFloat(amtI.value),
        method: s.m,
        comment: document.getElementById('comment').value
    }]);

    if (error) {
        alert("Помилка Supabase: " + error.message);
        btn.disabled = false;
        btnText.innerHTML = 'ЗБЕРЕГТИ';
        return;
    }

    confetti({ particleCount: 60, spread: 50, origin: { y: 0.8 }, colors: ['#ffffff', '#6366f1'] });
    btnText.innerHTML = 'DONE ✅';
    btn.style.backgroundColor = '#22c55e'; btn.style.color = '#fff';

    setTimeout(() => {
        amtI.value = ''; document.getElementById('comment').value = '';
        document.querySelectorAll('.cat-card').forEach(b => b.classList.remove('active'));
        btn.disabled = false; btnText.innerHTML = 'ЗБЕРЕГТИ';
        btn.style.backgroundColor = '#fff'; btn.style.color = '#000';
        loadData(); 
    }, 1000);
}

// Запуск при старті
document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
