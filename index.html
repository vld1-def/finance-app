<!DOCTYPE html>
<html lang="uk" style="background: #000; height: 100%;">
<head>
    <meta charset="UTF-8">
    <title>Glass Finance AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
 :root { --glass: rgba(255, 255, 255, 0.07); --glass-border: rgba(255, 255, 255, 0.1); }
        
        /* OLED BLACK FIX */
        html, body { 
            background-color: #000 !important; color: #fff; margin: 0; padding: 0; 
            height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif;
            position: fixed; /* Запобігає "плаванню" в Safari */
            touch-action: none; /* Вимикаємо стандартні жести браузера */
        }

        .safe-area { padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px; display: flex; flex-direction: column; height: 100%; background: #000; }
        .liquid-glass { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 18px; }
        
        .btn-user { background: var(--glass); border: 1px solid var(--glass-border); opacity: 0.4; transition: 0.2s; padding: 10px 0; flex: 1; text-align: center; font-size: 11px; font-weight: 600; border-radius: 10px; text-transform: uppercase; }
        .btn-user.active { opacity: 1; background: #fff; color: #000; border-color: #fff; }

        .cat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 14px; border-radius: 16px; display: flex; align-items: center; gap: 8px; font-size: 12px; transition: 0.2s; }
        .cat-card.active { background: #6366f1; border-color: #818cf8; transform: scale(0.97); }

        /* ANALYTICS DRAWER */
        #historyDrawer { 
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); backdrop-filter: blur(40px); 
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 50; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            touch-action: pan-y; /* Дозволяємо скрол тільки по вертикалі всередині */
        }
        #historyDrawer.open { right: 0; }
        
        .cat-grid-stats { display: grid; grid-template-rows: repeat(2, 1fr); grid-auto-flow: column; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .stat-chip { min-width: 110px; padding: 10px; background: var(--glass); border-radius: 12px; border: 1px solid var(--glass-border); }
        .stat-chip.selected { background: #6366f1; border-color: #fff; }

        .loader { width: 14px; height: 14px; border: 2px solid currentColor; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rot 0.6s linear infinite; }
        @keyframes rot { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #amount { font-size: 4rem; font-weight: 200; pointer-events: auto; }
        input, textarea, button { pointer-events: auto; } /* Дозволяємо кліки по елементах */
        /* Підсвітка активного місяця */
        .month-chip.active { 
            background-color: #fff !important; 
            color: #000 !important; 
            border-color: #fff !important; 
        }
        
        /* Дозволяємо прокрутку списку історії */
        #hList { 
            overflow-y: auto !important; 
            touch-action: pan-y; 
            -webkit-overflow-scrolling: touch;
        }
    </style>

</head>
<body>
    <div class="safe-area" id="mainContainer">
        <!-- Header -->
        <div class="flex gap-2 mb-4 mt-2">
            <div class="liquid-glass flex-1 p-3 text-center">
                <p id="curVlad" class="text-lg font-bold text-blue-400">₴0</p>
                <p class="text-[7px] opacity-30 uppercase font-bold text-white">Влад</p>
            </div>
            <div class="liquid-glass flex-1 p-3 text-center">
                <p id="curTania" class="text-lg font-bold text-pink-400">₴0</p>
                <p class="text-[7px] opacity-30 uppercase font-bold text-white">Таня</p>
            </div>
            <button onclick="toggleDrawer(true)" class="liquid-glass px-6 flex items-center text-xl">📊</button>
        </div>

        <div class="flex gap-2 mb-6">
            <div onclick="setUser('Влад', this)" class="btn-user">Влад</div>
            <div onclick="setUser('Таня', this)" class="btn-user">Таня</div>
        </div>

        <div class="flex-1 space-y-4 overflow-y-auto no-scrollbar pb-6" style="touch-action: pan-y;">
            <input type="number" id="amount" inputmode="decimal" placeholder="0" class="w-full bg-transparent text-center outline-none py-2 text-white">
            
            <div class="flex gap-2 px-8">
                <button onclick="setMethod('💳 Карта', this)" class="btn-user h-10 active">💳 Карта</button>
                <button onclick="setMethod('💵 Готівка', this)" class="btn-user h-10">💵 Готівка</button>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div onclick="setCat('🛒 Продукти', this)" class="cat-card">🛒 Продукти</div>
                <div onclick="setCat('☕️ Кафе/Їжа', this)" class="cat-card">☕️ Кафе</div>
                <div onclick="setCat('🚕 Транспорт', this)" class="cat-card">🚕 Таксі</div>
                <div onclick="setCat('💸 Переказ', this)" class="cat-card">💸 Переказ</div>
                <div onclick="setCat('🎬 Розваги', this)" class="cat-card">🎬 Розваги</div>
                <div onclick="setCat('📦 Інше', this)" class="cat-card">📦 Інше</div>
            </div>

            <input type="text" id="comment" placeholder="Коментар..." class="w-full bg-white/5 p-3 rounded-xl text-center outline-none border border-white/5 text-white text-[10px] h-10">
            
            <button onclick="save()" id="saveBtn" class="w-full py-4 rounded-xl font-bold bg-white text-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-2">
                <span id="btnText">ЗБЕРЕГТИ</span>
            </button>
        </div>
    </div>

    <!-- Analytics Drawer -->
    <div id="historyDrawer">
        <div class="flex justify-between items-center py-2 text-white">
            <h2 class="text-sm font-bold uppercase opacity-50">Аналітика</h2>
            <button onclick="toggleDrawer(false)" class="text-3xl opacity-30">&times;</button>
        </div>

        <div id="monthSelector" class="flex gap-2 overflow-x-auto no-scrollbar mb-4 py-1"></div>

        <div class="flex gap-2 mb-4">
            <div class="liquid-glass flex-1 p-3 text-center border-white/5">
                <p id="resCard" class="text-sm font-bold">₴0</p>
                <p class="text-[7px] opacity-40 uppercase font-bold">💳 Карта</p>
            </div>
            <div class="liquid-glass flex-1 p-3 text-center border-white/5">
                <p id="resCash" class="text-sm font-bold">₴0</p>
                <p class="text-[7px] opacity-40 uppercase font-bold">💵 Готівка</p>
            </div>
        </div>

        <div class="mb-4">
            <div id="catGrid" class="cat-grid-stats no-scrollbar py-1"></div>
        </div>

        <div class="flex gap-2 mb-4">
            <button id="fAll" onclick="fH('All', this)" class="btn-user active">Всі</button>
            <button id="fVlad" onclick="fH('Влад', this)" class="btn-user">Влад</button>
            <button id="fTania" onclick="fH('Таня', this)" class="btn-user">Таня</button>
        </div>

        <div id="hList" class="flex-1 overflow-y-auto space-y-2 pb-20 no-scrollbar"></div>
    </div>

    <script>
        // НАЛАШТУВАННЯ SUPABASE
        const SUPABASE_URL = 'https://xezhbqcteaihrlrykbkr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qNcUyFxMlWAWAry3uSHndg_ADVMCE3a';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        let s = { u: '', c: '', m: '💳 Карта', d: [], uF: 'All', cF: null, mF: '' };
        const months = ["Січ", "Лют", "Бер", "Квіт", "Трав", "Черв", "Лип", "Серп", "Вер", "Жовт", "Лист", "Груд"];

        // Функції кнопок
        function setUser(n, el) { s.u = n; document.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function setCat(n, el) { s.c = n; document.querySelectorAll('.cat-card').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function setMethod(m, el) { s.m = m; el.parentElement.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function toggleDrawer(o) { document.getElementById('historyDrawer').classList.toggle('open', o); }
        function fH(u, el) { s.uF = u; el.parentElement.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active')); el.classList.add('active'); render(); }

        // ЗАВАНТАЖЕННЯ (МЕПІНГ ПІД ТВОЇ СТОВПЦІ)
        async function loadData() {
            const { data, error } = await sb.from('expenses').select('*').order('date', { ascending: false });
            if (error) return console.error(error);

            s.d = data.map(item => {
                const dateObj = new Date(item.date);
                const mId = dateObj.getFullYear() + "-" + ("0" + (dateObj.getMonth() + 1)).slice(-2);
                return {
                    u: item.who || 'Влад',
                    c: item.categoria || 'Інше',
                    a: parseFloat(item.sum) || 0,
                    m: item.metod || '💳 Карта',
                    cm: item.comm || '',
                    mId: mId,
                    mLab: months[dateObj.getMonth()] + " " + dateObj.getFullYear().toString().slice(-2),
                    d: dateObj.toLocaleString('uk-UA', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})
                };
            });

            if (!s.mF && s.d.length > 0) s.mF = s.d[0].mId;
            else if (!s.mF) s.mF = new Date().getFullYear() + "-" + ("0" + (new Date().getMonth() + 1)).slice(-2);

            renderMonths();
            render();
        }

    function renderMonths() {
    const container = document.getElementById('monthSelector');
    if (!container) return;
    container.innerHTML = '';
    const uniqueMonths = {};
    s.d.forEach(i => { uniqueMonths[i.mId] = i.mLab; });
    
    Object.keys(uniqueMonths).sort().reverse().forEach(mId => {
        const div = document.createElement('div');
        // Перевірка: якщо місяць вибраний — додаємо клас active
        const isActive = s.mF === mId;
        div.className = `month-chip ${isActive ? 'active' : ''} bg-white/10 px-4 py-1.5 rounded-xl text-[10px] font-bold cursor-pointer whitespace-nowrap border border-white/5`;
        div.innerText = uniqueMonths[mId];
        div.onclick = (e) => { 
            e.stopPropagation();
            s.mF = mId; 
            renderMonths(); 
            render(); 
        };
        container.appendChild(div);
    });
}

        function render() {
            const list = document.getElementById('hList'); 
            const grid = document.getElementById('catGrid'); 
            list.innerHTML = ''; grid.innerHTML = '';
            let vS = 0, tS = 0, cardS = 0, cashS = 0, catTotals = {};

            s.d.forEach(i => {
                if(i.mId !== s.mF) return;
                if (i.u === 'Влад') vS += i.a; else if (i.u === 'Таня') tS += i.a;
                if(s.uF !== 'All' && i.u !== s.uF) return;
                if(i.m && i.m.includes("Карта")) cardS += i.a; else cashS += i.a;
                if(!catTotals[i.c]) catTotals[i.c] = 0; catTotals[i.c] += i.a;
                if(s.cF && i.c !== s.cF) return;

                const card = document.createElement('div');
                card.className = 'liquid-glass p-4 border-l-4 mb-2 ' + (i.u === 'Влад' ? 'border-blue-500' : 'border-pink-500');
                card.innerHTML = `<div class="flex flex-col text-white"><div class="flex justify-between items-center"><div><p class="font-bold text-[11px]">${i.c}</p><p class="text-[8px] opacity-40 uppercase">${i.d} • ${i.u} • ${i.m.split(' ')[0]}</p></div><p class="font-bold text-xs">₴${i.a.toLocaleString()}</p></div>${i.cm ? `<p class="text-[9px] italic opacity-60 mt-1 bg-white/5 p-1.5 rounded-lg">💬 ${i.cm}</p>` : ''}</div>`;
                list.appendChild(card);
            });

            document.getElementById('curVlad').innerText = '₴' + vS.toLocaleString();
            document.getElementById('curTania').innerText = '₴' + tS.toLocaleString();
            document.getElementById('resCard').innerText = '₴' + cardS.toLocaleString();
            document.getElementById('resCash').innerText = '₴' + cashS.toLocaleString();

            for (let name in catTotals) {
                const div = document.createElement('div');
                div.className = `stat-chip flex-shrink-0 ${s.cF === name ? 'selected' : ''} bg-white/5 p-3 rounded-xl border border-white/10`;
                if (s.cF === name) div.classList.add('bg-indigo-600', 'border-white');
                div.onclick = () => { s.cF = (s.cF === name) ? null : name; render(); };
                div.innerHTML = `<p class="text-[8px] opacity-50 truncate uppercase font-bold text-white">${name}</p><p class="font-black text-xs text-white">₴${catTotals[name].toLocaleString()}</p>`;
                grid.appendChild(div);
            }
        }

        async function save() {
            const amtI = document.getElementById('amount');
            const btn = document.getElementById('saveBtn');
            if(!s.u || !s.c || !amtI.value) return alert('Заповни все!');
            btn.disabled = true;
            document.getElementById('btnText').innerHTML = '<span class="loader"></span>';

           const { error } = await sb.from('expenses').insert([{
                date: new Date().toISOString(), // ISO формат передає і дату, і час
                who: s.u,
                categoria: s.c,
                sum: parseFloat(amtI.value),
                metod: s.m,
                comm: document.getElementById('comment').value
            }]);

            if (error) { alert("Error: " + error.message); btn.disabled = false; return; }

            confetti({ particleCount: 40, spread: 50, origin: { y: 0.8 } });
            document.getElementById('btnText').innerHTML = 'DONE ✅';
            btn.style.backgroundColor = '#22c55e'; btn.style.color = '#fff';

            setTimeout(() => {
                amtI.value = ''; document.getElementById('comment').value = '';
                btn.disabled = false; document.getElementById('btnText').innerHTML = 'ЗБЕРЕГТИ';
                btn.style.backgroundColor = '#fff'; btn.style.color = '#000';
                loadData(); 
            }, 1000);
        }

        // --- ЛОГІКА СВАЙПІВ (ПОВЕРНЕНО ТА ПОСИЛЕНО) ---
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
    const touchEndX = e.changedTouches[0].screenX;
    const touchEndY = e.changedTouches[0].screenY;
    
    const diffX = touchStartX - touchEndX;
    const diffY = touchStartY - touchEndY;

    // Свайп спрацює тільки якщо горизонтальний рух значно більший за вертикальний
    // Це дозволяє історії прокручуватися вниз, не закриваючи панель
    if (Math.abs(diffX) > Math.abs(diffY) * 2 && Math.abs(diffX) > 70) {
        if (diffX > 0) {
            toggleDrawer(true); // Свайп вліво - відкрити
        } else {
            toggleDrawer(false); // Свайп вправо - закрити
        }
    }
}, { passive: true });

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
