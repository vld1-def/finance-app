<!DOCTYPE html>
<html lang="uk" style="background: #000; height: 100%;">
<head>
    <meta charset="UTF-8">
    <title>Finance Glass Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.06); --glass-border: rgba(255, 255, 255, 0.1); }
        html, body { background-color: #000 !important; color: #fff; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; position: fixed; }
        .safe-area { padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px; display: flex; flex-direction: column; height: 100%; }
        .liquid-glass { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 18px; }
        
        .btn-user { background: var(--glass); border: 1px solid var(--glass-border); opacity: 0.4; transition: 0.2s; padding: 6px 0; flex: 1; text-align: center; font-size: 11px; font-weight: 600; border-radius: 10px; text-transform: uppercase; }
        .btn-user.active { opacity: 1; background: #fff; color: #000; }

        .method-btn { background: var(--glass); opacity: 0.5; flex: 1; padding: 8px; border-radius: 10px; font-size: 9px; font-weight: 700; border: 1px solid var(--glass-border); }
        .method-btn.active { opacity: 1; border-color: #fff; background: rgba(255,255,255,0.1); }

        .cat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; border-radius: 14px; display: flex; align-items: center; gap: 6px; font-size: 11px; transition: 0.2s; }
        .cat-card.active { background: #6366f1; border-color: #818cf8; transform: scale(0.97); }

        /* Аналітика в 2 рядки */
        .cat-grid-stats { display: grid; grid-template-rows: repeat(2, 1fr); grid-auto-flow: column; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .stat-chip { min-width: 110px; padding: 10px; background: var(--glass); border-radius: 14px; border: 1px solid var(--glass-border); transition: 0.2s; }
        .stat-chip.selected { background: #6366f1; border-color: #fff; }

        .loader { width: 14px; height: 14px; border: 2px solid #000; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rot 0.6s linear infinite; }
        @keyframes rot { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #historyDrawer { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: rgba(0,0,0,0.97); backdrop-filter: blur(40px); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 50; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; }
        #historyDrawer.open { right: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="safe-area">
        <!-- Header Stats -->
        <div class="flex gap-2 mb-4 mt-2">
            <div class="liquid-glass flex-1 p-2.5 text-center">
                <p id="tVlad" class="text-base font-bold text-blue-400">₴0</p>
                <p class="text-[7px] opacity-30 uppercase font-bold">Влад</p>
            </div>
            <div class="liquid-glass flex-1 p-2.5 text-center">
                <p id="tTania" class="text-base font-bold text-pink-400">₴0</p>
                <p class="text-[7px] opacity-30 uppercase font-bold">Таня</p>
            </div>
            <button onclick="toggleDrawer(true)" class="liquid-glass px-4 flex items-center text-lg">📊</button>
        </div>

        <!-- User Selection -->
        <div class="flex gap-2 mb-5">
            <div onclick="setUser('Влад', this)" class="btn-user">Влад</div>
            <div onclick="setUser('Таня', this)" class="btn-user">Таня</div>
        </div>

        <!-- Form -->
        <div class="flex-1 space-y-4 overflow-y-auto no-scrollbar pb-6">
            <input type="number" id="amount" inputmode="decimal" placeholder="0" class="w-full bg-transparent text-center outline-none py-1 text-6xl font-extralight text-white">

            <div class="flex gap-2 px-4">
                <button onclick="setMethod('Карта', this)" class="method-btn active">💳 КАРТА</button>
                <button onclick="setMethod('Готівка', this)" class="method-btn">💵 ГОТІВКА</button>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div onclick="setCat('🛒 Продукти', this)" class="cat-card">🛒 Продукти</div>
                <div onclick="setCat('☕️ Кафе/Їжа', this)" class="cat-card">☕️ Кафе</div>
                <div onclick="setCat('🚕 Транспорт', this)" class="cat-card">🚕 Таксі</div>
                <div onclick="setCat('🏠 Дім/Побут', this)" class="cat-card">🏠 Дім</div>
                <div onclick="setCat('🎬 Розваги', this)" class="cat-card">🎬 Розваги</div>
                <div onclick="setCat('📦 Інше', this)" class="cat-card">📦 Інше</div>
            </div>

            <input type="text" id="comment" placeholder="Коментар..." class="w-full bg-white/5 p-2.5 rounded-xl text-center outline-none border border-white/5 text-white text-[11px] h-10">

            <button onclick="save()" id="saveBtn" class="w-full py-3.5 rounded-xl font-bold bg-white text-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-2 transition-all">
                <span id="btnText">ЗБЕРЕГТИ</span>
            </button>
        </div>
    </div>

    <!-- Analytics Drawer -->
    <div id="historyDrawer" class="flex flex-col">
        <div class="flex justify-between items-center py-4">
            <h2 class="text-xl font-black italic uppercase text-white">Аналітика</h2>
            <button onclick="toggleDrawer(false)" class="text-3xl text-white opacity-30">&times;</button>
        </div>

        <!-- КАТЕГОРІЇ ПОВЕРНУТО -->
        <div class="mb-4">
            <p class="text-[8px] uppercase opacity-40 mb-2 tracking-widest font-bold">По категоріям</p>
            <div id="catGrid" class="cat-grid-stats no-scrollbar"></div>
        </div>

        <!-- ФІЛЬТР ЮЗЕРІВ В АНАЛІТИЦІ -->
        <div class="flex gap-2 mb-4">
            <button id="fAll" onclick="fH('All', this)" class="btn-user active">Всі</button>
            <button id="fVlad" onclick="fH('Влад', this)" class="btn-user">Влад</button>
            <button id="fTania" onclick="fH('Таня', this)" class="btn-user">Таня</button>
        </div>

        <div id="hList" class="flex-1 overflow-y-auto space-y-2 pb-20 no-scrollbar"></div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbw1l0vQGqeu6lF9uKQjpX0vzYyuQH3e_AGxE7Rd2miCX8PJKoQYHqqtnxN3QxF-udoY/exec'; 
        let s = { u: '', c: '', m: 'Карта', d: null, uF: 'All', cF: null };

        function setUser(n, el) { s.u = n; document.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function setCat(n, el) { s.c = n; document.querySelectorAll('.cat-card').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function setMethod(m, el) { s.m = m; document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function toggleDrawer(o) { document.getElementById('historyDrawer').classList.toggle('open', o); }
        
        function fH(u, el) { 
            s.uF = u; 
            const btns = el.parentElement.querySelectorAll('.btn-user');
            btns.forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render(); 
        }

        function loadData() {
            const script = document.createElement('script');
            script.src = `${API_URL}?callback=refreshUI&t=${Date.now()}`; 
            document.body.appendChild(script);
            script.onload = () => script.remove();
        }

        function refreshUI(data) {
            s.d = data;
            document.getElementById('tVlad').innerText = '₴' + data.stats.vlad.toLocaleString();
            document.getElementById('tTania').innerText = '₴' + data.stats.tania.toLocaleString();
            render();
        }

        function render() {
            if(!s.d) return;
            // Рендер історії
            const list = document.getElementById('hList'); list.innerHTML = '';
            s.d.history.forEach(i => {
                if(s.uF !== 'All' && i.u !== s.uF) return;
                if(s.cF && i.c !== s.cF) return;
                const card = document.createElement('div');
                card.className = 'liquid-glass p-3 border-l-4 ' + (i.u === 'Влад' ? 'border-blue-500' : 'border-pink-500');
                card.innerHTML = `<div class="flex justify-between items-center"><div><p class="font-bold text-[11px] text-white">${i.c}</p><p class="text-[8px] opacity-40 uppercase">${i.d} • ${i.u}</p></div><p class="font-bold text-xs text-white">₴${i.a}</p></div>`;
                list.appendChild(card);
            });

            // Рендер сітки категорій
            const grid = document.getElementById('catGrid'); grid.innerHTML = '';
            for (let name in s.d.catStats) {
                let val = s.uF === 'All' ? s.d.catStats[name].total : (s.uF === 'Влад' ? s.d.catStats[name].vlad : s.d.catStats[name].tania);
                if (val <= 0) continue;
                const div = document.createElement('div');
                div.className = `stat-chip flex-shrink-0 ${s.cF === name ? 'selected' : ''}`;
                div.onclick = () => { s.cF = (s.cF === name) ? null : name; render(); };
                div.innerHTML = `<p class="text-[8px] opacity-50 truncate uppercase font-bold">${name}</p><p class="font-black text-xs text-white">₴${val.toLocaleString()}</p>`;
                grid.appendChild(div);
            }
        }

        async function save() {
            const amtI = document.getElementById('amount');
            const btn = document.getElementById('saveBtn');
            const btnText = document.getElementById('btnText');
            if(!s.u || !s.c || !amtI.value) return alert('Заповни все!');
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="loader"></span>';

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ user: s.u, category: s.c, amount: amtI.value, method: s.m, comment: document.getElementById('comment').value }) });
                
                btnText.innerHTML = 'DONE ✅';
                btn.style.backgroundColor = '#22c55e'; btn.style.color = '#fff';

                setTimeout(() => {
                    amtI.value = ''; document.getElementById('comment').value = '';
                    document.querySelectorAll('.cat-card').forEach(b => b.classList.remove('active'));
                    btn.disabled = false; btnText.innerHTML = 'ЗБЕРЕГТИ';
                    btn.style.backgroundColor = '#fff'; btn.style.color = '#000';
                    loadData(); // Авто-оновлення даних
                }, 1000);
            } catch (e) { alert("Error"); btn.disabled = false; btnText.innerHTML = 'ЗБЕРЕГТИ'; }
        }

        let ts = 0; document.addEventListener('touchstart', e => ts = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => { let d = ts - e.changedTouches[0].screenX; if (d > 80) toggleDrawer(true); if (d < -80) toggleDrawer(false); });
        window.onload = loadData;
    </script>
</body>
</html>
